# Archived: inactive historical workflow.
name: Publish Docker image (nightly)

on:
  push:
    branches:
      - nightly
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false
      region:
        description: ECR region(s) to publish
        required: true
        default: both
        type: choice
        options:
          - both
          - us
          - cn

env:
  PUSH_REGION: ${{ inputs.region || 'both' }}
  ECR_US_REGISTRY: ${{ vars.AWS_US_ECR_REGISTRY || '928112001319.dkr.ecr.us-east-1.amazonaws.com' }}
  ECR_US_REGION: ${{ vars.AWS_US_REGION || 'us-east-1' }}
  ECR_US_REPOSITORY: ${{ vars.AWS_US_ECR_REPOSITORY || 'botlearn/new-api' }}
  ECR_CN_REGISTRY: ${{ vars.AWS_CN_ECR_REGISTRY }}
  ECR_CN_REGION: ${{ vars.AWS_CN_REGION || 'cn-northwest-1' }}
  ECR_CN_REPOSITORY: ${{ vars.AWS_CN_ECR_REPOSITORY || 'botlearn/new-api' }}

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.version.outputs.value }}

    permissions:
      contents: read

    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine nightly version
        id: version
        run: |
          VERSION="nightly-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            calciumion/new-api

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            calciumion/new-api:nightly-${{ matrix.arch }}
            calciumion/new-api:${{ steps.version.outputs.value }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_manifests:
    name: Create multi-arch manifests (Docker Hub)
    needs: [build_single_arch]
    runs-on: ubuntu-latest

    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine nightly version
        id: version
        run: |
          VERSION="${{ needs.build_single_arch.outputs.version }}"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - nightly)
        run: |
          docker buildx imagetools create \
            -t calciumion/new-api:nightly \
            calciumion/new-api:nightly-amd64 \
            calciumion/new-api:nightly-arm64

      - name: Create & push manifest (Docker Hub - versioned nightly)
        run: |
          docker buildx imagetools create \
            -t calciumion/new-api:${VERSION} \
            calciumion/new-api:${VERSION}-amd64 \
            calciumion/new-api:${VERSION}-arm64

  publish_us_ecr:
    name: Publish US ECR image
    needs: [build_single_arch]
    if: inputs.region != 'cn'
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${{ needs.build_single_arch.outputs.version }}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to US ECR
        uses: ./.github/actions/ecr-login
        with:
          label: US
          registry: ${{ env.ECR_US_REGISTRY }}
          region: ${{ env.ECR_US_REGION }}
          repository: ${{ env.ECR_US_REPOSITORY }}
          access-key-id: ${{ secrets.AWS_US_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.AWS_US_SECRET_ACCESS_KEY }}
          session-token: ${{ secrets.AWS_US_SESSION_TOKEN }}

      - name: Copy image and create US ECR manifests
        run: |
          for arch in amd64 arm64; do
            docker buildx imagetools create \
              --tag "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:nightly-${arch}" \
              --tag "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:${VERSION}-${arch}" \
              "calciumion/new-api:${VERSION}-${arch}"
          done
          docker buildx imagetools create \
            --tag "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:nightly" \
            --tag "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:${VERSION}" \
            "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:${VERSION}-amd64" \
            "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:${VERSION}-arm64"

  publish_cn_ecr:
    name: Publish CN ECR image
    needs: [build_single_arch]
    if: inputs.region != 'us'
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${{ needs.build_single_arch.outputs.version }}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to CN ECR
        uses: ./.github/actions/ecr-login
        with:
          label: CN
          registry: ${{ env.ECR_CN_REGISTRY }}
          region: ${{ env.ECR_CN_REGION }}
          repository: ${{ env.ECR_CN_REPOSITORY }}
          access-key-id: ${{ secrets.AWS_CN_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.AWS_CN_SECRET_ACCESS_KEY }}
          session-token: ${{ secrets.AWS_CN_SESSION_TOKEN }}

      - name: Copy image and create CN ECR manifests
        run: |
          for arch in amd64 arm64; do
            docker buildx imagetools create \
              --tag "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:nightly-${arch}" \
              --tag "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:${VERSION}-${arch}" \
              "calciumion/new-api:${VERSION}-${arch}"
          done
          docker buildx imagetools create \
            --tag "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:nightly" \
            --tag "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:${VERSION}" \
            "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:${VERSION}-amd64" \
            "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:${VERSION}-arm64"
