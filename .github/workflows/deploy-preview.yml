name: Deploy Preview

# Build the fork image, push to ECR (botlearn/new-api:preview),
# then restart the docker-compose deployment on the test server.
on:
  workflow_dispatch:

env:
  ECR_REGISTRY: 928112001319.dkr.ecr.us-east-1.amazonaws.com
  PROJECT: new-api
  COMPOSE_FILE: /www/devops/deployments/test/botcord-new-api/docker-compose.yaml

concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Push & Restart
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -t $PROJECT:test .
          echo "✅ Built $PROJECT:test"

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --region us-east-1 --repository-names botlearn/$PROJECT >/dev/null 2>&1 \
            || aws ecr create-repository --region us-east-1 --repository-name botlearn/$PROJECT

      - name: Push to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker tag $PROJECT:preview $ECR_REGISTRY/botlearn/$PROJECT:test
          docker push $ECR_REGISTRY/botlearn/$PROJECT:test
          echo "✅ Pushed $ECR_REGISTRY/botlearn/$PROJECT:test"

      - name: Restart preview (docker compose)
        run: |
          docker compose -f $COMPOSE_FILE pull
          docker compose -f $COMPOSE_FILE up -d
          echo "✅ Preview restarted"

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8042/api/status | grep -q '"success":\s*true'; then
              echo "✅ Service healthy"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Health check failed"
          docker compose -f $COMPOSE_FILE logs --tail=50 botcord-new-api
          exit 1
