name: Publish Docker image (alpha)

on:
  push:
    branches:
      - alpha
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false
      region:
        description: ECR region(s) to publish
        required: true
        default: both
        type: choice
        options:
          - both
          - us
          - cn

env:
  PUSH_REGION: ${{ inputs.region || 'both' }}
  ECR_US_REGISTRY: ${{ vars.AWS_US_ECR_REGISTRY || '928112001319.dkr.ecr.us-east-1.amazonaws.com' }}
  ECR_US_REGION: ${{ vars.AWS_US_REGION || 'us-east-1' }}
  ECR_US_REPOSITORY: ${{ vars.AWS_US_ECR_REPOSITORY || 'botlearn/new-api' }}
  ECR_CN_REGISTRY: ${{ vars.AWS_CN_ECR_REGISTRY }}
  ECR_CN_REGION: ${{ vars.AWS_CN_REGION || 'cn-northwest-1' }}
  ECR_CN_REPOSITORY: ${{ vars.AWS_CN_ECR_REPOSITORY || 'botlearn/new-api' }}

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.version.outputs.value }}
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Determine alpha version
        id: version
        run: |
          VERSION="alpha-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            calciumion/new-api
            ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Build & push single-arch (to both registries)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            calciumion/new-api:alpha-${{ matrix.arch }}
            calciumion/new-api:${{ steps.version.outputs.value }}-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:alpha-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ steps.version.outputs.value }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes calciumion/new-api@${{ steps.build.outputs.digest }}
          cosign sign --yes ghcr.io/${{ env.GHCR_REPOSITORY }}@${{ steps.build.outputs.digest }}

      - name: Output digest
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "calciumion/new-api:alpha-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ env.GHCR_REPOSITORY }}:alpha-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests (Docker Hub + GHCR)
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Determine alpha version
        id: version
        run: |
          VERSION="${{ needs.build_single_arch.outputs.version }}"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - alpha)
        run: |
          docker buildx imagetools create \
            -t calciumion/new-api:alpha \
            calciumion/new-api:alpha-amd64 \
            calciumion/new-api:alpha-arm64

      - name: Create & push manifest (Docker Hub - versioned alpha)
        run: |
          docker buildx imagetools create \
            -t calciumion/new-api:${VERSION} \
            calciumion/new-api:${VERSION}-amd64 \
            calciumion/new-api:${VERSION}-arm64

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR - alpha)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:alpha \
            ghcr.io/${GHCR_REPOSITORY}:alpha-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:alpha-arm64

      - name: Create & push manifest (GHCR - versioned alpha)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:${VERSION} \
            ghcr.io/${GHCR_REPOSITORY}:${VERSION}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:${VERSION}-arm64

      - name: Output manifest digest
        run: |
          echo "### Multi-arch Manifest Digests" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect calciumion/new-api:alpha >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/${GHCR_REPOSITORY}:alpha >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  publish_us_ecr:
    name: Publish US ECR image
    needs: [build_single_arch]
    if: inputs.region != 'cn'
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set version
        run: echo "VERSION=${{ needs.build_single_arch.outputs.version }}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to US ECR
        uses: ./.github/actions/ecr-login
        with:
          label: US
          registry: ${{ env.ECR_US_REGISTRY }}
          region: ${{ env.ECR_US_REGION }}
          repository: ${{ env.ECR_US_REPOSITORY }}
          access-key-id: ${{ secrets.AWS_US_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.AWS_US_SECRET_ACCESS_KEY }}
          session-token: ${{ secrets.AWS_US_SESSION_TOKEN }}

      - name: Copy image and create US ECR manifests
        run: |
          for arch in amd64 arm64; do
            docker buildx imagetools create \
              --tag "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:alpha-${arch}" \
              --tag "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:${VERSION}-${arch}" \
              "calciumion/new-api:${VERSION}-${arch}"
          done
          docker buildx imagetools create \
            --tag "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:alpha" \
            --tag "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:${VERSION}" \
            "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:${VERSION}-amd64" \
            "$ECR_US_REGISTRY/$ECR_US_REPOSITORY:${VERSION}-arm64"

  publish_cn_ecr:
    name: Publish CN ECR image
    needs: [build_single_arch]
    if: inputs.region != 'us'
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set version
        run: echo "VERSION=${{ needs.build_single_arch.outputs.version }}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to CN ECR
        uses: ./.github/actions/ecr-login
        with:
          label: CN
          registry: ${{ env.ECR_CN_REGISTRY }}
          region: ${{ env.ECR_CN_REGION }}
          repository: ${{ env.ECR_CN_REPOSITORY }}
          access-key-id: ${{ secrets.AWS_CN_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.AWS_CN_SECRET_ACCESS_KEY }}
          session-token: ${{ secrets.AWS_CN_SESSION_TOKEN }}

      - name: Copy image and create CN ECR manifests
        run: |
          for arch in amd64 arm64; do
            docker buildx imagetools create \
              --tag "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:alpha-${arch}" \
              --tag "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:${VERSION}-${arch}" \
              "calciumion/new-api:${VERSION}-${arch}"
          done
          docker buildx imagetools create \
            --tag "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:alpha" \
            --tag "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:${VERSION}" \
            "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:${VERSION}-amd64" \
            "$ECR_CN_REGISTRY/$ECR_CN_REPOSITORY:${VERSION}-arm64"
